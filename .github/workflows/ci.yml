name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build & test
        run: mvn -B -ntp verify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: obfuscator
          path: target/obfuscator.jar
          if-no-files-found: warn
